<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Work — Your Name</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="header">
    <a class="brand" href="index.html">Your Name</a>
    <nav class="nav">
      <a href="index.html">Works</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <main class="wrap">
    <a class="muted" href="index.html">← Back to works</a>
    <section id="work" class="workview"></section>
  </main>

  <footer class="footer">
    <span>© <span id="year"></span> Your Name</span>
  </footer>

  <script src="js/data.js"></script>
 <script>
  document.getElementById("year").textContent = new Date().getFullYear();

  const money = (n) => new Intl.NumberFormat(undefined, { style:"currency", currency:"USD" }).format(n);
  const id = new URL(location.href).searchParams.get("id");
  const p = (window.WORKS || []).find(x => x.id === id);
  const el = document.getElementById("work");

  if(!el){
    // nothing to render into
  } else if(!p){
    el.innerHTML = `<p class="muted">Work not found.</p>`;
  } else {
    el.innerHTML = `
      <div class="workimg">
        <img src="${p.image}" alt="${p.title}">
      </div>

      <div class="workmeta">
        <h1>${p.title}</h1>
        <p class="muted">${p.medium} · ${p.dimensions} · ${p.year}</p>
        <p>${p.description || ""}</p>

        <div class="pillrow">
          <span class="pill">${p.type === "original" ? "Original" : "Print"}</span>
          ${p.available ? `` : `<span class="pill sold">Sold</span>`}
        </div>

        <div class="buyrow">
          <strong class="price">${money(p.price)}</strong>
          ${
            p.available === true && p.checkoutUrl
              ? `<a class="btn" href="${p.checkoutUrl}" target="_blank" rel="noopener">Buy now</a>`
              : `<span class="muted">${p.available ? "Contact for purchase" : "Unavailable"}</span>`
          }
        </div>

        ${p.shipping ? `<p class="tiny muted">${p.shipping}</p>` : ``}
      </div>
    `;
  }
</script>
